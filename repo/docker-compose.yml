services:
  db:
    image: postgres:14
    environment:
      POSTGRES_DB: activity_audit
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    ports:
      - "8001:8000"
    depends_on:
      - db
    volumes:
      - ./storage:/app/storage

  frontend:
    build:
      context: ./frontend
    ports:
      - "3001:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
