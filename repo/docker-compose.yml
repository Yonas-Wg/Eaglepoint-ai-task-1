services:
  db:
    image: postgres:14
    environment:
      POSTGRES_DB: activity_audit
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    ports:
      - "8001:8000"
    depends_on:
      - db
    environment:
      APP_ENV: ${APP_ENV:-dev}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD:?ADMIN_BOOTSTRAP_PASSWORD is required}
      DEV_SEED_DEMO_USERS: ${DEV_SEED_DEMO_USERS:-false}
      REVIEWER_BOOTSTRAP_PASSWORD: ${REVIEWER_BOOTSTRAP_PASSWORD:-}
      FINANCE_BOOTSTRAP_PASSWORD: ${FINANCE_BOOTSTRAP_PASSWORD:-}
      APPLICANT_BOOTSTRAP_PASSWORD: ${APPLICANT_BOOTSTRAP_PASSWORD:-}
      ALERT_APPROVAL_RATE_MIN: ${ALERT_APPROVAL_RATE_MIN:-0.3}
      ALERT_CORRECTION_RATE_MAX: ${ALERT_CORRECTION_RATE_MAX:-0.7}
      ALERT_OVERSPENDING_RATE_MAX: ${ALERT_OVERSPENDING_RATE_MAX:-1.1}
    volumes:
      - ./storage:/app/storage

  frontend:
    build:
      context: ./frontend
    ports:
      - "3001:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
