services:
  db:
    image: postgres:14
    environment:
      POSTGRES_DB: activity_audit
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./repo/backend
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./repo/storage:/app/storage

  frontend:
    build:
      context: ./repo/frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
